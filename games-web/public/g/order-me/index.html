    <script>
      function openGameInApp(event) {
        if (event && typeof event.preventDefault === 'function') { event.preventDefault(); }
        var redirectPath = window.location.pathname + window.location.search + window.location.hash;
        try { sessionStorage.setItem("notes_redirect_path", redirectPath); } catch (e) {}
        window.location.assign("/");
      }
    </script></head>
  <body>
    <main>
      <h1>Play Order Me</h1>
      <p>Order the words by similarity to the main word.</p>
      <p><a href="/" onclick="openGameInApp(event)">Play This Game</a></p>
