<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Draw Things | Games With Friends</title>
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Draw things. Guess things. You have 20s." />
    
    <link rel="canonical" href="https://jumpship.media/g/draw-things/" />
<script>
      function openGameInApp(event) {
        if (event && typeof event.preventDefault === 'function') { event.preventDefault(); }
        var redirectPath = window.location.pathname + window.location.search + window.location.hash;
        try { sessionStorage.setItem("notes_redirect_path", redirectPath); } catch (e) {}
        window.location.assign("/");
      }
    </script></head>
  <body>
    <main>
      <h1>Play Draw Things</h1>
      <p>Draw in 7 seconds. Friends watch the replay and guess in 7 seconds.</p>
      <p><a href="/" onclick="openGameInApp(event)">Play This Game</a></p>
      <p><a href="/">Browse all games</a></p>
    </main>
  </body>
</html>
