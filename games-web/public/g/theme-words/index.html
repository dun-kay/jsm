<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Theme Words | Games With Friends</title>
    <meta name="robots" content="index,follow" />
    <meta name="description" content="A daily single-player word game. Find today's words from the letter theme." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Play Theme Words | Games With Friends" />
    <meta property="og:description" content="A daily single-player word game. Find today's words from the letter theme." />
    <meta property="og:url" content="https://jumpship.media/g/theme-words/" />
    <meta property="og:image" content="https://jumpship.media/assets/theme-words-logo-share.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Play Theme Words | Games With Friends" />
    <meta name="twitter:description" content="A daily single-player word game. Find today's words from the letter theme." />
    <meta name="twitter:image" content="https://jumpship.media/assets/theme-words-logo-share.png" />
    <link rel="canonical" href="https://jumpship.media/g/theme-words/" />
    <script>
      (function () {
        var ua = navigator.userAgent || "";
        var isBot = /bot|crawl|spider|slurp|bingpreview|facebookexternalhit|whatsapp|telegrambot|discordbot|twitterbot|linkedinbot/i.test(ua);
        if (!isBot) {
          var redirectPath = window.location.pathname + window.location.search + window.location.hash;
          try { sessionStorage.setItem("notes_redirect_path", redirectPath); } catch (e) {}
          window.location.replace("/");
        }
      })();

      function openGameInApp() {
        var redirectPath = window.location.pathname + window.location.search + window.location.hash;
        try { sessionStorage.setItem("notes_redirect_path", redirectPath); } catch (e) {}
        window.location.assign("/");
      }
    </script>
  </head>
  <body>
    <main>
      <h1>Play Theme Words</h1>
      <p>A daily single-player word game. Find all words from the daily theme.</p>
      <p><button onclick="openGameInApp()">Play This Game</button></p>
    </main>
  </body>
</html>
