<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Most Likely Rules | Games With Friends</title>
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Game Rules: Two players vote first, then the group validates the winner." />
    <link rel="canonical" href="https://jumpship.media/g/most-likely/rules/" />
    <script>
      function openGameInApp() {
        var redirectPath = window.location.pathname + window.location.search + window.location.hash;
        try { sessionStorage.setItem("notes_redirect_path", redirectPath); } catch (e) {}
        window.location.assign("/");
      }
    </script>
  </head>
  <body>
    <main>
      <h1>Most Likely Rules</h1>
      <p>Two players vote first, then the group validates the winner.</p>
      <p><button onclick="openGameInApp()">Play This Game</button></p>
    </main>
  </body>
</html>
